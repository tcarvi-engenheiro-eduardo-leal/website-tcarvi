# Firebase App Hosting — configuração de runtime para Angular SSR
# Docs: https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 1   # mantém uma instância sempre quente para evitar cold start no chat
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY   # valor armazenado no Secret Manager; veja CONTRIBUTING.md §4.6
