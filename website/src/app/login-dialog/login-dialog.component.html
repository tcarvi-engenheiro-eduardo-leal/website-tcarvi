<mat-card appearance="outlined" class="login-card">
  <mat-card-header>
    <mat-card-title>Sign in</mat-card-title>
    <mat-card-subtitle>Choose your preferred sign-in method</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <!-- Google -->
    <button class="social-btn google-btn" type="button" (click)="signInWithGoogle()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Sign in with Google</span>
    </button>

    <!-- Microsoft -->
    <button class="social-btn microsoft-btn" type="button" (click)="signInWithMicrosoft()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21" width="18" height="18" aria-hidden="true">
        <rect x="1"  y="1"  width="9" height="9" fill="#F25022"/>
        <rect x="11" y="1"  width="9" height="9" fill="#7FBA00"/>
        <rect x="1"  y="11" width="9" height="9" fill="#00A4EF"/>
        <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
      </svg>
      <span>Sign in with Microsoft</span>
    </button>

    <!-- Apple -->
    <button class="social-btn apple-btn" type="button" (click)="signInWithApple()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" width="18" height="18" aria-hidden="true">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.3-164-39.3c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 405.7 55.8 279.9 98.8 213.5c29.3-45.4 83.6-74.4 141.4-74.4 56.5 0 92.3 39.3 162.1 39.3 67.3 0 108.2-39.3 170.4-39.3 57.8 0 113.1 30.6 146.2 78.9zM554.1 158.3c21.9-27.2 37.2-65.6 37.2-104.8 0-5.9-.5-12.5-1.2-18.7a392.4 392.4 0 0 0-98.6 62.2c-24.5 24.5-48.9 62.2-48.9 100.8 0 6.5.8 12.9 1.8 18.7 4.5.6 9.8.9 15.1.9 35.5 0 77.4-19.5 94.6-58.1z" fill="white"/>
      </svg>
      <span>Sign in with Apple</span>
    </button>
  </mat-card-content>
</mat-card>
